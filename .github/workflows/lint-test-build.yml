# =============================================================================
# Lint, Test & Build — PR gate + reusable from rc-release.yml
# =============================================================================
#
# 1) JSHint on plugin JS (www, src, tests).
# 2) Optional release-style Cordova builds for Android + iOS (debug simulator/APK),
#    mirroring what RC-E2E exercises (same scripts as android-e2e / ios-e2e).
#
# Triggers: pull_request / push to master, workflow_dispatch, workflow_call.
# =============================================================================

name: Lint, Test & Build

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
  workflow_dispatch:
  workflow_call:
    inputs:
      skip_unit:
        description: 'Skip JSHint job'
        required: false
        type: boolean
        default: false
      skip_builds:
        description: 'Skip Android + iOS Cordova build jobs'
        required: false
        type: boolean
        default: false

concurrency:
  group: ltb-cordova-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: JSHint
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_unit != true }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  build-android:
    name: Build Cordova E2E app (Android)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ (needs.test.result == 'success' || needs.test.result == 'skipped') && inputs.skip_builds != true }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - uses: android-actions/setup-android@v4
        with:
          packages: >-
            platforms;android-34
            platform-tools
            build-tools;34.0.0
      - run: npm install -g cordova
      - name: Build Android (E2E sibling)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          CORDOVA_E2E_ANDROID_JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ./scripts/e2e-cordova-build.sh android

  build-ios:
    name: Build Cordova E2E app (iOS)
    runs-on: macos-15
    needs: test
    if: ${{ (needs.test.result == 'success' || needs.test.result == 'skipped') && inputs.skip_builds != true }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Xcode toolchain (runner default)
        run: |
          xcode-select -p
          xcodebuild -version
      - run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods -N
          fi
      - run: npm install -g cordova
      - name: Build iOS (simulator)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ./scripts/e2e-cordova-build.sh ios
