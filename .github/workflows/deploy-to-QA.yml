name: Deploy To QA

on:
  workflow_call:

jobs:
  Deploy-to-QA:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Git Authentication
        env:
          COMMIT_AUTHOR: ${{ secrets.CI_COMMIT_AUTHOR }}
          COMMIT_EMAIL: ${{ secrets.CI_COMMIT_EMAIL }}
          MY_PERSONAL_ACCESS_TOKEN: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
        run: |
          git config --global user.name $COMMIT_AUTHOR
          git config --global user.email $COMMIT_EMAIL
          git config --global credential.helper 'cache --timeout=300'
          git config --global --add "credential.https://github.com.username" "x-access-token"
          echo "https://x-access-token:$MY_PERSONAL_ACCESS_TOKEN@github.com" > ~/.git-credentials
          
      - name: Resolve version and validate RELEASENOTES.md
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          plugin_version=$(echo "$BRANCH_NAME" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "PLUGIN_VERSION=$plugin_version" >> $GITHUB_ENV
          chmod +x .github/workflows/scripts/extractReleaseNotesSection.sh
          .github/workflows/scripts/extractReleaseNotesSection.sh RELEASENOTES.md "$plugin_version" > release-notes-body.txt
      - name: Update package.json file
        run: |
          plugin_rc_version=$(echo "${{github.ref_name}}" | grep -Eo '[0-9].[0-9]+.[0-9]+-rc[0-9]+')
          echo "Updating plugin to version $plugin_rc_version"
          sed -i -r -e "s/\"version\": \"[0-9]+.[0-9]+.[0-9]+(-rc[0-9]+)?\"/\"version\": \"$plugin_rc_version\"/gi" package.json
          echo "Updating plugin.xml to version $plugin_rc_version"
          sed -i -r -e "s/version=\"[0-9].[0-9]+.[0-9]+\"/version=\"$plugin_rc_version\"/gi" plugin.xml
          git add plugin.xml package.json
          git commit -m "update plugin.xml and package.json files"

          # Push the changes
          git push
      - name: Push to NPM
        env:
          CI_NPM_TOKEN: ${{ secrets.CI_NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$CI_NPM_TOKEN" > ~/.npmrc
          npm publish --tag QA
      - name: Generate and send slack report
        env:
          SLACK_TOKEN: ${{ secrets.CI_SLACK_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ios_sdk_version=$(grep 'iOS AppsFlyerSDK' README.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "The ios sdk version is: $ios_sdk_version"
          android_sdk_version=$(grep 'Android AppsFlyerSDK' README.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          release_label="Cordova SDK v${{ env.PLUGIN_VERSION }}"
          CHANGES=$(cat release-notes-body.txt)
          PAYLOAD=$(jq -n \
            --arg jfv "$release_label" \
            --arg dt "QA" \
            --arg it "QA" \
            --arg gb "$REF_NAME" \
            --arg cf "$CHANGES" \
            --arg ad "$android_sdk_version" \
            --arg id "$ios_sdk_version" \
            '{jira_fixed_version: $jfv, deploy_type: $dt, install_tag: $it, git_branch: $gb, changes_and_fixes: $cf, android_dependency: $ad, ios_dependency: $id}')
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_TOKEN"
