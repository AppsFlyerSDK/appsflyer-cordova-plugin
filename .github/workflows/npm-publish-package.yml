# =============================================================================
# npm publish (trusted publishing / OIDC) — Cordova plugin
# =============================================================================
#
# Reusable workflow: ONLY checkout + npm publish. Register this filename on
# npmjs.com → Package → Trusted publishing (GitHub Actions).
#
# Callers: rc-release.yml (QA tag), release-Production-workflow.yml (latest).
# Both caller workflows must grant id-token: write on the calling job.
#
# Requires: Node ≥ 22.14, npm CLI ≥ 11.5.1, GitHub-hosted runners.
# Do not set NODE_AUTH_TOKEN / CI_NPM_TOKEN for publish — OIDC via setup-node.
# =============================================================================

name: npm publish (OIDC)

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: 'Git ref (branch, tag, or SHA) to checkout before publish'
        required: true
        type: string
      npm_dist_tag:
        description: 'npm dist-tag (QA for RC, latest for production)'
        required: true
        type: string
      dry_run:
        description: 'If true, run npm publish --dry-run only'
        required: false
        type: boolean
        default: false
      access:
        description: 'npm publish --access value'
        required: false
        type: string
        default: public
    outputs:
      published:
        description: 'true when a real publish ran; false for dry-run'
        value: ${{ jobs.publish.outputs.published }}

permissions:
  id-token: write
  contents: read

concurrency:
  group: npm-oidc-${{ github.repository }}-${{ inputs.checkout_ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.publish.outputs.published }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Ensure npm CLI for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm install

      - id: publish
        name: Publish to npm (OIDC)
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          DIST_TAG: ${{ inputs.npm_dist_tag }}
          ACCESS: ${{ inputs.access }}
        run: |
          set -euo pipefail
          dry="$(printf '%s' "$DRY_RUN" | tr '[:upper:]' '[:lower:]')"
          extra=()
          if [[ "$dry" == "true" ]]; then
            extra+=(--dry-run)
          fi
          if [[ "$DIST_TAG" == "latest" ]]; then
            npm publish --access "$ACCESS" "${extra[@]}"
          else
            npm publish --tag "$DIST_TAG" --access "$ACCESS" "${extra[@]}"
          fi
          if [[ "$dry" == "true" ]]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
          else
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi
