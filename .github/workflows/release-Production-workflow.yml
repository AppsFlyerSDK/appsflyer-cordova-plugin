name: Release plugin to production

on:
  pull_request:
    types:
      - closed
    branches:
      - 'master'
    paths-ignore:
      - '**.md'
      - '**.yml'
      - 'examples/**'
      - 'hooks/**'
      - 'resources/**'
      - 'testsScripts/**'
      - 'docs/**'
jobs:
  Deploy-To-Production:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
          persist-credentials: true

      - name: Login to Github
        env:
          COMMIT_AUTHOR: ${{ secrets.CI_COMMIT_AUTHOR }}
          COMMIT_EMAIL: ${{ secrets.CI_COMMIT_EMAIL }}
          MY_PERSONAL_ACCESS_TOKEN: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
        run: |
          git config --global user.name $COMMIT_AUTHOR
          git config --global user.email $COMMIT_EMAIL
          git config --global credential.helper 'cache --timeout=300'
          git config --global --add "credential.https://github.com.username" "x-access-token"
          echo "https://x-access-token:$MY_PERSONAL_ACCESS_TOKEN@github.com" > ~/.git-credentials
      - uses: mdecoleman/pr-branch-name@1.2.0
        id: vars
        with:
          repo-token: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
      - name: Determine release tag and release branch
        run: |
          TAG=$(echo "${{ steps.vars.outputs.branch }}" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "PLUGIN_VERSION=$TAG" >> $GITHUB_ENV
          echo "RELEASE_BRANCH_NAME=${{ steps.vars.outputs.branch }}" >> $GITHUB_ENV
          echo "push new release >> $TAG"

      - name: "Create release"
        env:
          TAG: ${{env.PLUGIN_VERSION}}
        uses: "actions/github-script@v5"
        with:
          github-token: "${{ secrets.CI_DEV_GITHUB_TOKEN }}"
          script: |
            try {
              await github.rest.repos.createRelease({
                draft: false,
                generate_release_notes: false,
                name: process.env.TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.TAG
              });
            } catch (error) {
              core.setFailed(error.message);
            }
      - name: Push to NPM
        env:
          CI_NPM_TOKEN: ${{ secrets.CI_NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$CI_NPM_TOKEN" > ~/.npmrc
          npm publish

      - name: Generate and send slack report
        env:
          SLACK_TOKEN: ${{ secrets.CI_SLACK_TOKEN }}
          RELEASE_BRACH_NAME: ${{ env.RELEASE_BRANCH_NAME }}
        run: |
          chmod +x .github/workflows/scripts/extractReleaseNotesSection.sh
          .github/workflows/scripts/extractReleaseNotesSection.sh RELEASENOTES.md "${{ env.PLUGIN_VERSION }}" > release-notes-body.txt
          android_sdk_version=$(grep 'Android AppsFlyerSDK' README.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          ios_sdk_version=$(grep 'iOS AppsFlyerSDK' README.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          release_label="Cordova SDK v${{ env.PLUGIN_VERSION }}"
          CHANGES=$(cat release-notes-body.txt)
          PAYLOAD=$(jq -n \
            --arg jfv "$release_label" \
            --arg dt "Production" \
            --arg it "latest" \
            --arg gb "$RELEASE_BRACH_NAME" \
            --arg cf "$CHANGES" \
            --arg ad "$android_sdk_version" \
            --arg id "$ios_sdk_version" \
            '{jira_fixed_version: $jfv, deploy_type: $dt, install_tag: $it, git_branch: $gb, changes_and_fixes: $cf, android_dependency: $ad, ios_dependency: $id}')
          curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_TOKEN"

