# Production release on merge to master. npm publish via npm-publish-package.yml (OIDC).
name: Release plugin to production

on:
  pull_request:
    types:
      - closed
    branches:
      - 'master'
    paths-ignore:
      - '**.md'
      - '**.yml'
      - 'examples/**'
      - 'hooks/**'
      - 'resources/**'
      - 'testsScripts/**'
      - 'docs/**'
jobs:
  deploy:
    name: Deploy-To-Production
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      plugin_version: ${{ steps.meta.outputs.plugin_version }}
      release_branch_name: ${{ steps.meta.outputs.release_branch_name }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
          persist-credentials: true

      - name: Login to Github
        env:
          COMMIT_AUTHOR: ${{ secrets.CI_COMMIT_AUTHOR }}
          COMMIT_EMAIL: ${{ secrets.CI_COMMIT_EMAIL }}
          MY_PERSONAL_ACCESS_TOKEN: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
        run: |
          git config --global user.name $COMMIT_AUTHOR
          git config --global user.email $COMMIT_EMAIL
          git config --global credential.helper 'cache --timeout=300'
          git config --global --add "credential.https://github.com.username" "x-access-token"
          echo "https://x-access-token:$MY_PERSONAL_ACCESS_TOKEN@github.com" > ~/.git-credentials
      - uses: mdecoleman/pr-branch-name@1.2.0
        id: vars
        with:
          repo-token: ${{ secrets.CI_DEV_GITHUB_TOKEN }}
      - id: meta
        name: Determine release tag and release branch
        run: |
          TAG=$(echo "${{ steps.vars.outputs.branch }}" | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          BRANCH="${{ steps.vars.outputs.branch }}"
          echo "PLUGIN_VERSION=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH_NAME=$BRANCH" >> "$GITHUB_ENV"
          echo "plugin_version=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_branch_name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "push new release >> $TAG"

      - name: "Create release"
        env:
          TAG: ${{env.PLUGIN_VERSION}}
        uses: "actions/github-script@v5"
        with:
          github-token: "${{ secrets.CI_DEV_GITHUB_TOKEN }}"
          script: |
            try {
              await github.rest.repos.createRelease({
                draft: false,
                generate_release_notes: false,
                name: process.env.TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.TAG
              });
            } catch (error) {
              core.setFailed(error.message);
            }
  publish-npm:
    name: Publish to npm (OIDC)
    needs: deploy
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/npm-publish-package.yml
    with:
      checkout_ref: ${{ github.sha }}
      npm_dist_tag: latest
      dry_run: false
      access: public

  notify-slack:
    name: Notify Slack
    needs: [deploy, publish-npm]
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - name: Generate Slack payload
        env:
          PLUGIN_VERSION: ${{ needs.deploy.outputs.plugin_version }}
          RELEASE_BRANCH_NAME: ${{ needs.deploy.outputs.release_branch_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          CHANGES=$(awk -v ver="${PLUGIN_VERSION}" '
            $0 ~ "^## " ver "$" { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' RELEASENOTES.md | sed '/^[[:space:]]*$/d')
          if [ -z "$CHANGES" ]; then
            echo "Missing release notes for version ${PLUGIN_VERSION} in RELEASENOTES.md"
            exit 1
          fi
          android_sdk_version=$(grep 'Android AppsFlyerSDK' README.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          ios_sdk_version=$(grep 'iOS AppsFlyerSDK' README.md | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          jq -n \
            --arg ver "$PLUGIN_VERSION" \
            --arg branch "$RELEASE_BRANCH_NAME" \
            --arg android "$android_sdk_version" \
            --arg ios "$ios_sdk_version" \
            --arg url "$RUN_URL" \
            --arg changes "$CHANGES" \
            '{text: (
              "*Cordova Production* `" + $ver + "`\n" +
              "• Branch: `" + $branch + "`\n" +
              "• Install tag: `latest` (Production)\n" +
              "• Android AppsFlyerSDK: `" + $android + "`\n" +
              "• iOS AppsFlyerSDK: `" + $ios + "`\n" +
              "• Changes:\n```\n" + $changes + "\n```\n" +
              "• Run: " + $url
            )}' > slack-payload.json

      - name: Slack (optional)
        continue-on-error: true
        uses: slackapi/slack-github-action@v1
        with:
          payload-file-path: slack-payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}
