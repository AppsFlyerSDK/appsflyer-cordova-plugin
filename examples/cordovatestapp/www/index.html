<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" type="text/css" href="css/index.css"/>
    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/index.js"></script>
</head>

<body>
<div class="hero">
    <div class="banner">
        <button class="banner-btn" onClick="document.getElementById('logEvent').scrollIntoView();">Let's start</button>
    </div>
</div>

<div class="btn-group-vertical">
    <section class="button-section">
        <h3>SDK Lifecycle</h3>
        <button type="button" id="startSdk" class="btn btn-primary">Start SDK</button>
        <button type="button" id="stop" class="btn btn-primary">Stop SDK</button>
        <button type="button" id="onPause" class="btn btn-primary">On Pause</button>
    </section>

    <section class="button-section">
        <h3>Events</h3>
        <button type="button" id="logEvent" class="btn btn-primary">Log Event</button>
        <button type="button" id="logSession" class="btn btn-primary">Log Session</button>
        <button type="button" id="logInvite" class="btn btn-primary">Log Invite</button>
        <button type="button" id="logLocation" class="btn btn-primary">Log Location</button>
        <button type="button" id="logAdRevenue" class="btn btn-primary">Log Ad Revenue</button>
    </section>

    <section class="button-section">
        <h3>Cross Promotion & Invite</h3>
        <button type="button" id="logCrossPromotionImpression" class="btn btn-primary">Log Cross Promotion Impression</button>
        <button type="button" id="logCrossPromotionAndOpenStore" class="btn btn-primary">Log Cross Promotion And Open Store</button>
        <button type="button" id="generateUserInvite" class="btn btn-primary">Generate User Invite</button>
    </section>

    <section class="button-section">
        <h3>Conversion Data</h3>
        <button type="button" id="unregisterConversionDataListener" class="btn btn-primary">Unregister Conversion Data Listener</button>
    </section>

    <section class="button-section">
        <h3>Session Ready</h3>
        <button type="button" id="unregisterSessionReadyListener" class="btn btn-primary">Unregister Session Ready Listener</button>
        <button type="button" id="isSessionReady" class="btn btn-primary">Is Session Ready</button>
    </section>

    <section class="button-section">
        <h3>User & Identity</h3>
        <button type="button" id="setUserId" class="btn btn-primary">Set App User Id</button>
        <button type="button" id="getUserId" class="btn btn-primary">Get AppsFlyer UID</button>
        <button type="button" id="anonymizeUser" class="btn btn-primary">Anonymize User</button>
    </section>

    <section class="button-section">
        <h3>Configuration</h3>
        <button type="button" id="setCurrency" class="btn btn-primary">Set Currency</button>
        <button type="button" id="setUserEmails" class="btn btn-primary">Set User Emails</button>
        <button type="button" id="setPhone" class="btn btn-primary">Set Phone Number</button>
        <button type="button" id="setHosts" class="btn btn-primary">Set Host</button>
        <button type="button" id="setMinTimeBetweenSessions" class="btn btn-primary">Set Min Time Between Sessions</button>
        <button type="button" id="setOutOfStore" class="btn btn-primary">Set Out Of Store</button>
        <button type="button" id="setUserEmailsWithCryptType" class="btn btn-primary">Set User Emails With Crypt Type</button>
        <button type="button" id="setPreinstallAttribution" class="btn btn-primary">Set Preinstall Attribution</button>
        <button type="button" id="setLogLevel" class="btn btn-primary">Set Log Level</button>
        <button type="button" id="setIsUpdate" class="btn btn-primary">Set Is Update</button>
        <button type="button" id="setAppId" class="btn btn-primary">Set App Id</button>
        <button type="button" id="setInstallId" class="btn btn-primary">Set Install Id</button>
        <button type="button" id="setSharingFilterForPartners" class="btn btn-primary">Set Sharing Filter For Partners</button>
        <button type="button" id="setAdditionalData" class="btn btn-primary">Set Additional Data</button>
        <button type="button" id="setPartnerData" class="btn btn-primary">Set Partner Data</button>
        <button type="button" id="setDisableAdvertisingIdentifier" class="btn btn-primary">Set Disable Advertising Identifier</button>
        <button type="button" id="setDisableNetworkData" class="btn btn-primary">Set Disable Network Data</button>
    </section>

    <section class="button-section">
        <h3>Getters</h3>
        <button type="button" id="getSdkV" class="btn btn-primary">Get SDK Version</button>
        <button type="button" id="getHostName" class="btn btn-primary">Get Host Name</button>
        <button type="button" id="getHostPrefix" class="btn btn-primary">Get Host Prefix</button>
        <button type="button" id="getOutOfStore" class="btn btn-primary">Get Out Of Store</button>
        <button type="button" id="getAttributionId" class="btn btn-primary">Get Attribution Id</button>
        <button type="button" id="isStopped" class="btn btn-primary">Is Stopped</button>
        <button type="button" id="isPreInstalledApp" class="btn btn-primary">Is Pre Installed App</button>
    </section>

    <section class="button-section">
        <h3>Deep Linking</h3>
        <button type="button" id="unsubscribeForDeepLink" class="btn btn-primary">Unsubscribe For Deep Link</button>
        <button type="button" id="performDeepLinking" class="btn btn-primary">Perform Deep Linking</button>
        <button type="button" id="setDeepLinkTimeout" class="btn btn-primary">Set Deep Link Timeout</button>
        <button type="button" id="appendParametersToDeepLinkingURL" class="btn btn-primary">Append Params To Deep Link URL</button>
        <button type="button" id="customDomains" class="btn btn-primary">Set OneLink Custom Domains</button>
        <button type="button" id="addPushNotificationPath" class="btn btn-primary">Add Push Notification Deep Link Path</button>
        <button type="button" id="setResolveDeepLinkURLs" class="btn btn-primary">Set Resolve Deep Link URLs</button>
    </section>

    <section class="button-section">
        <h3>Push & Uninstall</h3>
        <button type="button" id="sendPushNotificationData" class="btn btn-primary">Send Push Notification Data</button>
        <button type="button" id="updateServerUninstallToken" class="btn btn-primary">Update Server Uninstall Token</button>
    </section>

    <section class="button-section">
        <h3>Purchase & Other</h3>
        <button type="button" id="validateAndLog" class="btn btn-primary">Validate And Log In-App Purchase</button>
        <button type="button" id="disableAppSetId" class="btn btn-primary">Disable App Set Id</button>
        <button type="button" id="enableFB" class="btn btn-primary">Enable Facebook Deferred Applinks</button>
    </section>

    <!-- Consent Section -->
    <div class="consent-section">
        <h3>Consent Settings</h3>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="isUserSubjectToGDPR">
            <label class="form-check-label" for="isUserSubjectToGDPR">Is User Subject to GDPR</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="hasConsentForDataUsage">
            <label class="form-check-label" for="hasConsentForDataUsage">Has Consent for Data Usage</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="hasConsentForAdsPersonalization">
            <label class="form-check-label" for="hasConsentForAdsPersonalization">Has Consent for Ads Personalization</label>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="hasConsentForAdStorage">
            <label class="form-check-label" for="hasConsentForAdStorage">Has Consent for Ad Storage</label>
        </div>
        <button type="button" id="testSetConsent" class="btn btn-primary">Set AppsFlyer consent</button>
    </div>
</div>

<script type="text/javascript" src="js/buttons.js"></script>
</body>
</html>
